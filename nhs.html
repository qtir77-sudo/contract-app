<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NHS GP Letter Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;600;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --nhs-blue: #005EB8;
    --nhs-dark: #003087;
    --nhs-green: #009639;
    --nhs-warm-yellow: #FFB81C;
    --nhs-light: #E8EDEE;
    --nhs-white: #FFFFFF;
    --text-dark: #1a1a2e;
    --text-mid: #4a5568;
    --radius: 4px;
    --shadow: 0 2px 12px rgba(0,94,184,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fira Sans', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: var(--text-dark);
  }

  /* Top bar */
  .topbar {
    background: var(--nhs-blue);
    padding: 0;
    display: flex;
    align-items: stretch;
  }
  .topbar-inner {
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
  }
  .nhs-logo {
    background: var(--nhs-white);
    color: var(--nhs-blue);
    font-family: 'Fira Mono', monospace;
    font-weight: 700;
    font-size: 22px;
    padding: 4px 10px;
    letter-spacing: -1px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .topbar-title {
    color: var(--nhs-white);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .topbar-version {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
    font-family: 'Fira Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 2px;
  }

  /* Layout */
  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* Section cards */
  .card {
    background: var(--nhs-white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
    border-left: 4px solid var(--nhs-blue);
  }
  .card-header {
    background: var(--nhs-blue);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-header h2 {
    color: var(--nhs-white);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .card-icon {
    width: 22px;
    height: 22px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  .card-body {
    padding: 20px 24px;
  }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .col-span-2 { grid-column: span 2; }

  /* Fields */
  .field { display: flex; flex-direction: column; gap: 5px; }
  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  input {
    height: 40px;
    border: 1.5px solid #d0d9e2;
    border-radius: var(--radius);
    padding: 0 12px;
    font-family: 'Fira Sans', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    background: #fafcff;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  input:focus {
    border-color: var(--nhs-blue);
    box-shadow: 0 0 0 3px rgba(0,94,184,0.15);
    background: #fff;
  }
  input::placeholder { color: #b0bec5; font-style: italic; }

  /* Action bar */
  .action-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 28px;
  }

  .btn-generate {
    background: var(--nhs-blue);
    color: white;
    border: none;
    height: 48px;
    padding: 0 36px;
    border-radius: var(--radius);
    font-family: 'Fira Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-generate:hover { background: var(--nhs-dark); }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { background: #90aac8; cursor: not-allowed; }

  .btn-reset {
    background: transparent;
    color: var(--text-mid);
    border: 1.5px solid #d0d9e2;
    height: 48px;
    padding: 0 20px;
    border-radius: var(--radius);
    font-family: 'Fira Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover { border-color: var(--nhs-blue); color: var(--nhs-blue); }

  /* Status */
  .status {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    margin-top: 16px;
  }
  .status.loading {
    display: flex;
    background: #e8f0fb;
    color: var(--nhs-blue);
    border: 1px solid #c2d5ef;
  }
  .status.success {
    display: flex;
    background: #e6f9ec;
    color: #1a7a3c;
    border: 1px solid #a8ddb8;
  }
  .status.error {
    display: flex;
    background: #fdecea;
    color: #c0392b;
    border: 1px solid #f5c6c2;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(0,94,184,0.25);
    border-top-color: var(--nhs-blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Info note */
  .note {
    background: #fffbea;
    border-left: 4px solid var(--nhs-warm-yellow);
    padding: 12px 16px;
    font-size: 13px;
    color: #6b5a00;
    margin-bottom: 20px;
    border-radius: 0 var(--radius) var(--radius) 0;
  }

  @media (max-width: 600px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .col-span-2 { grid-column: span 1; }
  }
</style>
</head>

<script>
function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  if (type === 'loading') {
    el.innerHTML = '<div class="spinner"></div><span>' + msg + '</span>';
  } else if (type === 'success') {
    el.innerHTML = '✅ ' + msg;
  } else {
    el.innerHTML = '❌ ' + msg;
  }
}

function val(id) {
  return document.getElementById(id).value.trim();
}

function generateNHS() {
  for (;;) {
    var d = [];
    for (var i = 0; i < 9; i++) d.push(Math.floor(Math.random() * 10));
    var sum = 0;
    for (var j = 0; j < 9; j++) sum += d[j] * (10 - j);
    var check = 11 - (sum % 11);
    if (check === 10) continue;
    if (check === 11) check = 0;
    d.push(check);
    var s = d.join("");
    document.getElementById("nhs_no").value = s.slice(0,3) + " " + s.slice(3,6) + " " + s.slice(6);
    break;
  }
}

function setAIStatus(type, msg) {
  var el = document.getElementById('ai_status');
  el.style.display = 'block';
  if (type === 'loading') {
    el.style.background = '#e8f0fb'; el.style.color = '#005EB8'; el.style.border = '1px solid #c2d5ef';
    el.innerHTML = '<span style="display:inline-block;width:12px;height:12px;border:2px solid #c2d5ef;border-top-color:#005EB8;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle;"></span>' + msg;
  } else if (type === 'success') {
    el.style.background = '#e6f9ec'; el.style.color = '#1a7a3c'; el.style.border = '1px solid #a8ddb8';
    el.innerHTML = '✅ ' + msg;
  } else {
    el.style.background = '#fdecea'; el.style.color = '#c0392b'; el.style.border = '1px solid #f5c6c2';
    el.innerHTML = '❌ ' + msg;
  }
}

function fillGP(gp) {
  document.getElementById('gp_name').value   = gp.name   || '';
  document.getElementById('gp_addr1').value  = gp.street || '';
  document.getElementById('gp_addr2').value  = gp.town   || '';
  document.getElementById('gp_addr3').value  = gp.postcode || '';
  document.getElementById('reception').value = gp.phone  || '';
  document.getElementById('ai_results').style.display = 'none';
  setAIStatus('success', 'Completat: ' + gp.name);
}

         || Object.keys(GP_DB).find(k => cityLower.includes(k.toLowerCase()));
  
  var gps = key ? GP_DB[key] : [];
  
  if (!gps.length) {
    setAIStatus('error', 'Niciun GP gasit pentru "' + city + '". Incearca: ' + Object.keys(GP_DB).slice(0,5).join(', ') + '...');
    return;
  }
  
  var resultsEl = document.getElementById('ai_results');
  resultsEl.innerHTML = '<div style="font-size:12px;font-weight:600;color:#005EB8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;">Selecteaza GP (' + gps.length + ' gasite in ' + (key||city) + '):</div>' +
    gps.map(function(gp) {
      return '<div onclick=\'fillGP(' + JSON.stringify(gp).replace(/\'/g,"&#39;") + ')\' style="padding:10px 12px;margin-bottom:6px;border:1.5px solid #c2d5ef;border-radius:4px;cursor:pointer;background:#fff;transition:background 0.15s;" onmouseover="this.style.background=\'#e8f0fb\'" onmouseout="this.style.background=\'#fff\'">' +
        '<div style="font-weight:600;font-size:13px;color:#003087;">' + (gp.name||'') + '</div>' +
        '<div style="font-size:12px;color:#555;margin-top:2px;">' + [gp.street,gp.town,gp.postcode].filter(Boolean).join(', ') + '</div>' +
        '<div style="font-size:12px;color:#005EB8;margin-top:2px;">' + (gp.phone||'') + '</div>' +
      '</div>';
    }).join('');
  resultsEl.style.display = 'block';
  setAIStatus('success', gps.length + ' GP-uri gasite in ' + (key||city) + '. Click sa selectezi.');
}

async function generate() {
  const btn = document.getElementById('btnGen');
  btn.disabled = true;
  setStatus('loading', 'Generez PDF-ul...');

  const data = {
    patient_name:  val('patient_name'),
    patient_addr1: val('patient_addr1'),
    patient_addr2: val('patient_addr2'),
    patient_addr3: val('patient_addr3'),
    nhs_no:        val('nhs_no'),
    dob:           val('dob'),
    gp_name:       val('gp_name'),
    gp_addr1:      val('gp_addr1'),
    gp_addr2:      val('gp_addr2'),
    gp_addr3:      val('gp_addr3'),
    reception:     val('reception'),
    reg_date:      val('reg_date'),
  };

  try {
    const resp = await fetch('/generate-nhs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(err || 'Server error ' + resp.status);
    }

    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'nhs-registration.pdf';
    a.click();
    URL.revokeObjectURL(url);

    setStatus('success', 'PDF generat cu succes! Descărcarea a început.');
  } catch (e) {
    setStatus('error', 'Eroare: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

function resetForm() {
  ['patient_name','patient_addr1','patient_addr2','patient_addr3',
   'nhs_no','dob','gp_name','gp_addr1','gp_addr2','gp_addr3',
   'reception','reg_date'].forEach(id => {
    document.getElementById(id).value = '';
  });
  const el = document.getElementById('status');
  el.className = 'status';
}
