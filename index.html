<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DgoGPT Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; }
    
    header {
      background: #1a3a5c;
      color: #fff;
      padding: 1.5rem 2rem;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    header p { opacity: 0.8; font-size: 0.95rem; }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 2rem 1rem 0;
    }
    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      background: #fff;
      border: 2px solid #d0d9e2;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: #1a3a5c;
      min-width: 220px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .tab:hover {
      border-color: #1a3a5c;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .tab .icon { font-size: 3rem; }
    .tab .title { font-size: 1.1rem; font-weight: 700; }
    .tab .desc { font-size: 0.85rem; color: #5f6c7b; text-align: center; }

    .tab.contract { border-color: #1a5f4a; }
    .tab.contract:hover { border-color: #1a5f4a; background: #f0fdf8; }
    .tab.contract .title { color: #1a5f4a; }

    .tab.nhs { border-color: #005EB8; }
    .tab.nhs:hover { border-color: #005EB8; background: #f0f6ff; }
    .tab.nhs .title { color: #005EB8; }

    footer {
      text-align: center;
      padding: 3rem 1rem 2rem;
      color: #888;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🏠 DgoGPT Tools</h1>
  <p>Selecteaza tool-ul dorit</p>
</header>

<div class="tabs">
  <a href="/contract.html" class="tab contract">
    <div class="icon">📄</div>
    <div class="title">Contract PDF</div>
    <div class="desc">Completare contract de inchiriere<br>Assured Shorthold Tenancy</div>
  </a>

  <a href="/nhs.html" class="tab nhs">
    <div class="icon">🏥</div>
    <div class="title">NHS GP Letter</div>
    <div class="desc">Generare scrisoare de inregistrare<br>la medicul de familie NHS</div>
  </a>
</div>

<footer><footer style="font-size:2rem; font-weight:900; color:#e63946; text-shadow:2px 2px 8px rgba(0,0,0,0.15);"><footer style="font-size:2rem; font-weight:900; color:#e63946; text-shadow:2px 2px 8px rgba(0,0,0,0.15); text-align:center; padding:2rem;">GEPETO TE IUBESTE ❤️<br><span style="font-size:3rem;">FRATII MEI 🔥</span></footer>
</footer></footer>

</body>
</html>
